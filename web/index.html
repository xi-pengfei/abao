<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#faf7ef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="阿宝">
  <title>阿宝</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <main class="app-shell" aria-label="对话">
    <header class="topbar">
      <div class="identity">
        <svg class="mark" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="40" cy="40" r="38" fill="#ff6b5a"/>
          <g class="jelly-core">
            <circle cx="36" cy="26" r="9"   fill="rgba(255,255,255,0.16)"/>
            <circle cx="36" cy="26" r="5.5" fill="rgba(255,255,255,0.26)"/>
            <circle cx="36" cy="26" r="2.8" fill="rgba(255,255,255,0.95)"/>
          </g>
          <g class="jelly-body">
            <path d="M 16 48 C 11 28 20 11 37 10 C 55 9 68 25 66 46" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.88)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M 16 48 Q 21 54 27 47 Q 32 40 37 48 Q 44 57 51 46 Q 57 37 62 46 Q 64 50 66 46" fill="none" stroke="rgba(255,255,255,0.60)" stroke-width="1" stroke-linecap="round"/>
            <path d="M 37 10 L 34 38"             stroke="rgba(255,255,255,0.32)" stroke-width="0.9" fill="none"/>
            <path d="M 24 19 C 20 28 19 36 20 46" stroke="rgba(255,255,255,0.18)" stroke-width="0.7" fill="none"/>
            <path d="M 58 20 L 62 34"             stroke="rgba(255,255,255,0.22)" stroke-width="0.8" fill="none"/>
            <path d="M 21 50 C 16 62 22 70 15 74" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="0.9" stroke-linecap="round"/>
            <path d="M 30 51 C 27 57 29 61 26 63" fill="none" stroke="rgba(255,255,255,0.80)" stroke-width="2.4" stroke-linecap="round"/>
            <path d="M 40 52 C 38 62 43 69 39 76" fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="1"   stroke-dasharray="3 4" stroke-linecap="round"/>
            <path d="M 60 48 C 67 51 70 55 67 60" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.1" stroke-linecap="round"/>
            <path d="M 51 50 C 56 61 50 68 45 71" fill="none" stroke="rgba(255,255,255,0.70)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M 45 51 C 44 59 46 64 44 69" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="0.7" stroke-linecap="round"/>
            <circle cx="54" cy="66" r="1.2" fill="rgba(255,255,255,0.45)"/>
          </g>
        </svg>
        <div>
          <h1 id="agentName">阿宝</h1>
          <p id="statusText">正在连接</p>
        </div>
      </div>
      <button class="icon-button" id="settingsButton" type="button" aria-label="设置" title="设置">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.22 3.22l1.41 1.41M13.37 13.37l1.41 1.41M3.22 14.78l1.41-1.41M13.37 4.63l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <section class="chat" id="chat" aria-live="polite">
      <div class="empty-state" id="emptyState">
        <p>今天从哪里开始？</p>
      </div>
    </section>

    <form class="composer" id="composer">
      <textarea id="input" rows="1" placeholder="说点什么" aria-label="输入消息"></textarea>
      <button class="send-button" type="submit" aria-label="发送" title="发送">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M9 14V4M4 9l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>
  </main>

  <aside class="settings-panel" id="settingsPanel" aria-hidden="true">
    <div class="settings-sheet">
      <div class="sheet-header">
        <h2>连接设置</h2>
        <button class="icon-button" id="closeSettings" type="button" aria-label="关闭" title="关闭">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <label>
        <span>Server URL</span>
        <input id="serverUrl" value="" inputmode="url" autocomplete="off">
      </label>
      <label>
        <span>Access Token</span>
        <input id="accessToken" value="" type="password" autocomplete="off">
      </label>
      <div class="settings-actions">
        <button class="plain-action" id="testConnection" type="button">测试连接</button>
        <button class="plain-action primary" id="saveSettings" type="button">保存</button>
      </div>
      <p class="pwa-hint">
        iPhone 安装：Safari 打开本页 → 底部分享按钮 → 添加到主屏幕
      </p>
    </div>
  </aside>

  <script src="./app.js"></script>
</body>
</html>
